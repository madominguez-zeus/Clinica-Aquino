<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas - Clínica Aquino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="citas">

    <aside class="sidebar">
        <div class="logo-container">
            <h2><i class="fas fa-heartbeat" style="color: var(--accent-green);"></i> Clínica Aquino</h2>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="index.html"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></a></li>
                <li><a href="citas.html" class="active"><i class="fas fa-calendar-alt"></i> <span>Citas</span></a></li>
                <li><a href="hce.html"><i class="fas fa-notes-medical"></i> <span>Historia Clínica</span></a></li>
                <li><a href="erp.html"><i class="fas fa-file-invoice-dollar"></i> <span>ERP Financiero</span></a></li>
                <li><a href="pacs.html"><i class="fas fa-x-ray"></i> <span>Imágenes Médicas</span></a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button id="menu-toggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
            <div class="user-profile">
                <span>Dr. Admin Aquino</span>
                <img src="https://ui-avatars.com/api/?name=Admin+Aquino&background=2ecc71&color=fff" alt="Perfil">
                <button onclick="logout()" style="background: transparent; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.2rem; margin-left: 15px;" title="Cerrar Sesión"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <section class="content-area">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>Gestión de Citas</h1>
                    <p>Programación de citas para pacientes</p>
                </div>
                <button class="btn btn-primary" onclick="abrirModalCita()"><i class="fas fa-plus"></i> Nueva Cita</button>
            </div>

            <div class="data-table-container">
                <div class="flex-between">
                    <h3>Citas Programadas</h3>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="buscador-citas" placeholder="Buscar por paciente o médico...">
                    </div>
                </div>
                
                <table id="tabla-citas">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Paciente</th>
                            <th>Médico Asignado</th>
                            <th>Motivo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align: center;">Cargando citas...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Modal Nueva Cita -->
        <div id="modal-cita" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('modal-cita')">&times;</span>
                <h2 style="margin-bottom: 20px; color: var(--primary-blue);">Agendar Nueva Cita</h2>
                <form id="form-cita">
                    <div class="form-group">
                        <label>Paciente</label>
                        <select id="cita-paciente" required>
                            <option value="">Seleccione un paciente...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Personal Médico</label>
                        <select id="cita-medico" required>
                            <option value="">Seleccione el médico...</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Fecha</label>
                            <input type="date" id="cita-fecha" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Hora</label>
                            <input type="time" id="cita-hora" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Motivo de la Consulta</label>
                        <input type="text" id="cita-motivo" placeholder="Ej. Dolor de cabeza frecuente" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Guardar Cita</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/citas.js"></script>
</body>
</html>
